<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Magic 2d image Slider</title>
    <link rel="stylesheet" href="style.css">
<link href="https://fonts.googleapis.com/css?family=Poppins:100,100italic,200,200italic,300,300italic,regular,italic,500,500italic,600,600italic,700,700italic,800,800italic,900,900italic" rel="stylesheet" />
<link href="https://fonts.googleapis.com/css?family=Rubik+Glitch:regular" rel="stylesheet" />
  </head>
  <body>
    <div class="banner">
      <div class="slider" style="--quantity: 10">
        <div class="item">
          <img style="--position: 0deg" src="thumbs/image1.png" alt="" />
        </div>
        <div class="item">
          <img style="--position: 1deg" src="thumbs/image2.png" alt="" />
        </div>
        <div class="item">
          <img style="--position: 2deg" src="thumbs/image3.png" alt="" />
        </div>
        <div class="item">
          <img style="--position: 3deg" src="thumbs/image4.png" alt="" />
        </div>
        <div class="item">
          <img style="--position: 4deg" src="thumbs/image5.png" alt="" />
        </div>
        <div class="item">
          <img style="--position: 5deg" src="thumbs/image6.png" alt="" />
        </div>
        <div class="item">
          <img style="--position: 6deg" src="thumbs/image7.png" alt="" />
        </div>
        <div class="item">
          <img style="--position: 7deg" src="thumbs/image8.png" alt="" />
        </div>
        <div class="item">
          <img style="--position: 8deg" src="thumbs/image9.png" alt="" />
        </div>
        <div class="item">
          <img style="--position: 9deg" src="thumbs/image10.png" alt="" />

        </div>
      </div>

      <div class="content">
        <h1>
          CSS ONLY
        </h1>
        
    </div>
    <script src="script.js"></script>
  </body>
</html>
