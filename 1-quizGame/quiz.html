<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Quiz Game</title>
    <link rel="stylesheet" href="quiz.css" />
  </head>
  <body>
    <div class="container">
      <div class="screen active" id="start-screen">
        <h1>Hey I'm Quiz</h1>
        <p>Test your knowledge with these fun questions</p>
        <button id="start-btn">Start Quiz</button>
      </div>

      <div class="screen" id="quiz-screen">
        <div class="quiz-header">
          <h2 id="question-text">Question goes here</h2>
          <div class="quiz-info">
            <p>
              Question <span id="current-question">1</span> of
              <span id="question-length">5</span>
            </p>
            <p>
              Score: <span id="score">0</span> out of <span id="total-questions"></span>
            </p>
          </div>
        </div>

        <div class="answers-container" id="answers-container">

        </div>

        <div class="progress-bar">
          <div id="progress" class="progress">

          </div>
        </div>

      </div>

      <div class="screen" id="result-screen">
        <h1>Quiz Results</h1>
        <div class="result-info">
          <p>You scored <span id="final-score">0</span> out of <span id="max-score"></span></p>

          <div id="result-message">Good Job!</div>
          <button id="restart-btn">Restart Game</button>
        </div>
        
      </div>
    </div>

    <script src="script.js"></script>
  </body>
</html>
